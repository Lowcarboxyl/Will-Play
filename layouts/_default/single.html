{{ define "main" }}
<article class="post-content">
    <header class="post-header">
        <div class="post-icon">{{ .Params.icon | default "📝" }}</div>
        <h1>{{ .Title }}</h1>
        <time>{{ .Date.Format "January 2, 2006" }}</time>
    </header>
    
    <hr class="wii-divider">

    <section class="body-text">
        {{ .Content }}
    </section>
    
    <footer class="post-footer">
        <div class="back-navigation-row">
            <a href="/Will-Play/" class="wii-back-btn">
                <span class="btn-arrow">◀</span> Back to Timeline
            </a>
        </div>
    </footer>
</article>
{{ end }}
